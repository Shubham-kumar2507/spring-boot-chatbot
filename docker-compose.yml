version: '3.8'

services:
  chatbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chatbot-app
    ports:
      - "8085:8085
    environment:
      - JAVA_OPTS=-Xmx512m -Xms256m
      - server.port=8085
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8085/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - chatbot-network

networks:
  chatbot-network:
    driver: bridge
