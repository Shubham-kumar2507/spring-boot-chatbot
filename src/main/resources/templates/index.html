<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-robot"></i>
                <span>GeminiChat</span>
            </div>
            <nav>
                <a href="#" class="active"><i class="fa-solid fa-message"></i> Chat</a>
                <a href="#"><i class="fa-solid fa-clock-rotate-left"></i> History</a>
                <a href="#"><i class="fa-solid fa-gear"></i> Settings</a>
            </nav>
            <div class="user-profile">
                <div class="avatar"><i class="fa-solid fa-user"></i></div>
                <div class="user-info">
                    <span class="name">User</span>
                    <span class="status">Online</span>
                </div>
            </div>
        </aside>

        <main class="chat-interface">
            <header class="chat-header">
                <div class="header-info">
                    <h2>AI Assistant</h2>
                    <p>Powered by Google Gemini Pro</p>
                </div>
                <div class="header-actions">
                    <button class="icon-btn" title="Clear Chat"><i class="fa-solid fa-trash-can"></i></button>
                    <button class="icon-btn" title="Toggle Theme"><i class="fa-solid fa-moon"></i></button>
                </div>
            </header>

            <div id="chatMessages" class="messages-area">
                <div class="message bot-message welcome-message">
                    <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                    <div class="message-content">
                        <p>Hello! I'm your advanced AI assistant. I can help you with coding, writing, analysis, and more. How can I assist you today?</p>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <form id="chatForm" class="input-container">
                    <button type="button" class="attach-btn"><i class="fa-solid fa-paperclip"></i></button>
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="Type your message..." 
                        autocomplete="off"
                        required>
                    <button type="submit" class="send-btn" id="sendButton">
                        <i class="fa-solid fa-paper-plane"></i>
                    </button>
                </form>
                <p class="disclaimer">AI can make mistakes. Please verify important information.</p>
            </div>
        </main>
    </div>

    <script>
       
        const chatForm = document.getElementById('chatForm');
        const messageInput = document.getElementById('messageInput');
        const chatMessages = document.getElementById('chatMessages');
        const sendButton = document.getElementById('sendButton');
        const attachBtn = document.querySelector('.attach-btn');
        const clearBtn = document.querySelector('[title="Clear Chat"]');
        const themeBtn = document.querySelector('[title="Toggle Theme"]');
        const navLinks = document.querySelectorAll('nav a');
        const sidebar = document.querySelector('.sidebar');

        let isDarkMode = true; // Default is dark mode

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle('light-mode');
           
            const icon = themeBtn.querySelector('i');
            if (isDarkMode) {
                icon.className = 'fa-solid fa-moon';
                themeBtn.setAttribute('title', 'Switch to Light Mode');
            } else {
                icon.className = 'fa-solid fa-sun';
                themeBtn.setAttribute('title', 'Switch to Dark Mode');
            }
  
            localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
        }

        function loadThemePreference() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            if (savedTheme === 'light') {
                isDarkMode = false;
                document.body.classList.add('light-mode');
                themeBtn.querySelector('i').className = 'fa-solid fa-sun';
            }
        }

        navLinks.forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();

                navLinks.forEach(l => l.classList.remove('active'));
      
                link.classList.add('active');
                
          
                const action = link.textContent.trim().toLowerCase();
                handleNavigation(action);
            });
        });

        function handleNavigation(action) {
            if (action.includes('chat')) {
            
                messageInput.focus();
                
                showNotification('Chat mode activated', 'info');
            } else if (action.includes('history')) {
                showNotification('Chat history feature coming soon!', 'info');
            } else if (action.includes('settings')) {
                showNotification('Settings feature coming soon!', 'info');
            }
        }

        // ===== Clear Chat Functionality =====
        clearBtn.addEventListener('click', () => {
            if (chatMessages.children.length > 1) {
                if (confirm('Are you sure you want to clear all messages?')) {
                    // Keep only the welcome message
                    const welcomeMsg = chatMessages.querySelector('.welcome-message');
                    chatMessages.innerHTML = '';
                    if (welcomeMsg) {
                        chatMessages.appendChild(welcomeMsg);
                    }
                    messageInput.focus();
                    showNotification('Chat cleared!', 'success');
                }
            } else {
                showNotification('No messages to clear', 'info');
            }
        });

        // ===== Theme Toggle =====
        themeBtn.addEventListener('click', toggleTheme);

        // ===== Attachment Button =====
        attachBtn.addEventListener('click', () => {
            // Show file input dialog or feature notification
            showNotification('📎 File attachment feature coming soon!', 'info');
        });

        // ===== Chat Form Submission =====
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const message = messageInput.value.trim();
            if (!message) return;

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            setLoading(true);

            // Show temporary loading bubble
            const loadingId = addLoadingBubble();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                
                // Remove loading bubble
                document.getElementById(loadingId)?.remove();
                
                // Add bot response
                // Format plain text response gracefully
                addMessage(data.response, 'bot');
            } catch (error) {
                document.getElementById(loadingId)?.remove();
                addMessage('Sorry, something went wrong. Please try again.', 'bot', true);
            } finally {
                setLoading(false);
                messageInput.focus();
            }
        });

        // ===== Helper Functions =====
        function addMessage(text, sender, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}-message ${isError ? 'error-message' : ''}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar';
            avatar.innerHTML = sender === 'user' ? '<i class="fa-solid fa-user"></i>' : '<i class="fa-solid fa-robot"></i>';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            
            // Allow basic line breaks
            const formattedText = text.replace(/\n/g, '<br>');
            contentDiv.innerHTML = `<p>${formattedText}</p>`;
            
            if (sender === 'bot') {
                messageDiv.appendChild(avatar);
                messageDiv.appendChild(contentDiv);
            } else {
                messageDiv.appendChild(contentDiv);
                messageDiv.appendChild(avatar);
            }

            chatMessages.appendChild(messageDiv);
            scrollToBottom();
        }

        function addLoadingBubble() {
            const id = 'loading-' + Date.now();
            const messageDiv = document.createElement('div');
            messageDiv.id = id;
            messageDiv.className = 'message bot-message loading-message';
            
            messageDiv.innerHTML = `
                <div class="avatar"><i class="fa-solid fa-robot"></i></div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(messageDiv);
            scrollToBottom();
            return id;
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function setLoading(isLoading) {
            messageInput.disabled = isLoading;
            sendButton.disabled = isLoading;
            if (isLoading) {
                sendButton.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';
            } else {
                sendButton.innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
            }
        }

        function showNotification(message, type = 'info') {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.textContent = message;
            notification.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background-color: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : '#3b82f6'};
                color: white;
                padding: 12px 24px;
                border-radius: 8px;
                box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
                z-index: 1000;
                animation: slideIn 0.3s ease-out;
                font-size: 0.9rem;
            `;
            
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.animation = 'slideOut 0.3s ease-out';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        document.addEventListener('keydown', (e) => {
    
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                messageInput.focus();
            }
       
            if ((e.ctrlKey || e.metaKey) && e.key === 'l') {
                e.preventDefault();
                clearBtn.click();
            }
            if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key === 't') {
                e.preventDefault();
                themeBtn.click();
            }
        });

        loadThemePreference();
        messageInput.focus();

        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { 
                    opacity: 0; 
                    transform: translateX(100px); 
                }
                to { 
                    opacity: 1; 
                    transform: translateX(0); 
                }
            }
            @keyframes slideOut {
                from { 
                    opacity: 1; 
                    transform: translateX(0); 
                }
                to { 
                    opacity: 0; 
                    transform: translateX(100px); 
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
